# CycloneNet Configuration File
# This file centralizes all parameters for the pipeline.
# Comments follow international standards for clarity and reproducibility.

# ----------------------------------------------------------------------
# Paths: Directory locations for data, outputs, and logs
# ----------------------------------------------------------------------
paths:
  raw_data: ./data/raw # Raw downloaded ERA5 monthly NetCDF files (never modified)
  interim_data: ./data/interim # Intermediate artifacts: per-event cubes, metadata, grids
  processed_data: ./data/processed # (Reserved for future use)
  results_dir: ./outputs/results # Evaluation outputs: metrics, predictions, figures
  logs_dir: ./outputs/logs # Pipeline execution logs
  event_list: ./data/event_list_augmented.csv # IBTrACS-derived event list with RI labels
  normalized_dir: ./data/normalized # Normalization stats, splits, sanity reports
  splits_csv: ./data/normalized/splits.csv # Train/val/test splits by event_id
  frozen_splits: ./data/normalized/frozen_splits.json # SID->split overrides (historical benchmark; wins over the hash)
  normalization_stats: ./data/normalized/normalization_stats.json # Mean/std per input channel (train only)
  sanity_report: ./data/normalized/sanity_report.json # Output of sanity gate
  valid_manifest: ./data/normalized/valid_events.csv # List of events that passed preprocessing
  tchp_dir: ./data/external/tchp # Directory for external TCHP data (validation only)
  ocean_dir: ./data/external/ocean # Sea level anomaly (SLA/ADT) ocean fields

# ----------------------------------------------------------------------
# Sanity: Thresholds for the minimal sanity gate (hard-fail checks)
# ----------------------------------------------------------------------
sanity:
  sample_n: 200 # Number of events to sample for sanity check
  wind_rel_err_max: 0.05 # Maximum relative error for wind identity check (sqrt(u²+v²))
  vort_abs_max: 0.1 # (Unused currently) placeholder
  div_abs_max: 0.1 # (Unused currently) placeholder

# ----------------------------------------------------------------------
# Download: ERA5 and TCHP download settings
# ----------------------------------------------------------------------
download:
  cds_api: # Copernicus Climate Data Store API credentials
    url: https://cds.climate.copernicus.eu/api
    key:
  dataset: reanalysis-era5-single-levels # ERA5 dataset name
  variables: # Variables to download
    - sea_surface_temperature
    - mean_sea_level_pressure
    - 10m_u_component_of_wind
    - 10m_v_component_of_wind
    - 2m_temperature
    - 2m_dewpoint_temperature
  years: [1980, 2025] # Inclusive range of years (full archive; processed in windows — see run.py process-windows)
  months: [6, 7, 8, 9, 10, 11] # Atlantic hurricane season months
  days: ALL # Download all days
  times: ["00:00", "06:00", "12:00", "18:00"] # 6‑hourly synoptic times
  grid: [0.25, 0.25] # 0.25° resolution (ERA5 native)
  download_format: netcdf
  time_granularity: monthly # Download as monthly files
  split_after_download: false # Never split files; keep original
  spatial_subset: [60, -140, 0, -20] # [N, W, S, E] bounding box (two-basin sector: East Pacific + North Atlantic; cuts EP west of 140°W)
  max_workers: 8 # Parallel downloads

  # TCHP (Tropical Cyclone Heat Potential) external data – for validation only, not model input
  tchp:
    enabled: true # Enable to download TCHP data (requires additional setup)
    source: auto # 'noaa', 'aoml', 'copernicus', or 'auto' (year‑based)
    years: [2020, 2024] # Years to download (can be auto‑detected from event list)
    lat_min: 0.0
    lat_max: 60.0
    lon_min: -100.0
    lon_max: -10.0
    variables: # Variables requested from source
      - Tropical_Cyclone_Heat_Potential
      - D26
    copernicus: # Credentials for Copernicus Marine Service (if needed)
      dataset_id: "cmems_mod_glo_phy_my_0.25deg_P1D-m"
      username: ""
      password: ""

  # Sea Level Anomaly / Absolute Dynamic Topography — surface signature of the
  # subsurface ocean heat reservoir. ADT is used as an extra MODEL INPUT (see
  # model.use_adt_input); SLA is the eddy anomaly. Reuses the Copernicus creds above.
  ssh:
    enabled: true
    dataset_id: "cmems_obs-sl_glo_phy-ssh_my_allsat-l4-duacs-0.125deg_P1D"
    variables: [sla, adt]
    years: [2022, 2023]        # years with valid gridded TCHP (for SLA<->TCHP validation)
    season_months: [8, 9, 10]
    box: { lat_min: 5.0, lat_max: 40.0, lon_min: -100.0, lon_max: -15.0 }

# ----------------------------------------------------------------------
# Data: Parameters for cube extraction from ERA5
# ----------------------------------------------------------------------
data:
  window_size_px: 40 # Spatial patch size (pixels) – 40×40 grid points
  offsets_hours: [0, -6, -12, -18, -24] # Time steps relative to event time (t0, t-6, t-12, ...)
  variables: # ERA5 variable names in NetCDF files
    sst: sst
    msl: msl
    u10: u10
    v10: v10
  qc: # Quality control thresholds
    sst_range_K: [240.0, 330.0] # Physical range for SST (Kelvin)
    msl_range_Pa: [80000.0, 110000.0] # Physical range for MSLP (Pascal)
    wind_abs_max_mps: 80.0 # Maximum absolute wind speed (m/s)
    max_nan_fraction_per_channel: 0.5 # Reject event if >50% NaN in any channel

# ----------------------------------------------------------------------
# Physics: Diagnostic channel computation and heat flux settings
# ----------------------------------------------------------------------
physics:
  diagnostics:
    enabled: true
    channels: # List of diagnostics to compute (order preserved)
      - wind_speed
      - vorticity
      - divergence
      - grad_mslp
      - sst_anom
      - latent_heat_flux
      - sensible_heat_flux
      - total_heat_flux
  heat_flux:
    enabled: true
    require_real_inputs: false # If true, t2m/d2m must be present; otherwise use approximations
    Ce: 0.0012 # Bulk transfer coefficient for latent heat
    Ch: 0.0012 # Bulk transfer coefficient for sensible heat

# ----------------------------------------------------------------------
# Labels: Rapid Intensification (RI) definition and targets
# ----------------------------------------------------------------------
labels:
  ri_threshold_kt_24h: 30.0 # ΔV ≥ 30 kt over 24h defines RI
  lead_times_hours: [12, 24] # Forecast lead times for continuous targets (dv12, dv24)
  time_step_hours: 6 # Temporal resolution of IBTrACS (6‑hourly)

# ----------------------------------------------------------------------
# Splits: Train/validation/test partitioning by storm (SID)
# ----------------------------------------------------------------------
splits:
  seed: 1337 # Random seed for reproducibility
  train_frac: 0.7
  val_frac: 0.15
  test_frac: 0.15

# ----------------------------------------------------------------------
# Physics‑Guided: Settings for physics‑informed losses
# ----------------------------------------------------------------------
physics_guided:
  losses:
    exclude_total_heat_flux_from_input: true # Prevent leakage: total heat flux is loss‑only, not input
    total_heat_flux_channel_name: total_heat_flux_Wpm2 # Name of the total heat flux channel in metadata

# ----------------------------------------------------------------------
# Model: Neural network architecture parameters
# ----------------------------------------------------------------------
model:
  input_channels: 9 # Number of input channels (must match input_channels_names length)
  input_channels_names: # Ordered list of input channel names (from preprocessed cubes)
    - sst_K
    - mslp_Pa
    - u10_mps
    - v10_mps
    - wind_mps
    - vort_1ps
    - div_1ps
    - grad_mslp_Pa_per_m
    - sst_anom_K
  use_sta: false # Whether to use spatio‑temporal attention module (if implemented by model)
  hidden_channels: 32 # Base number of hidden channels in convolutional layers
  dropout: 0.1 # Dropout rate for regularization
  use_adt_input: true # Append ADT (sea surface height) as an extra ocean channel (+1 input).
                      # Requires 'run.py preprocess-adt'. Justified by ADT<->TCHP proxy (rho~0.30).

# ----------------------------------------------------------------------
# Training: Hyperparameters for model optimization
# ----------------------------------------------------------------------
training:
  device: auto # 'auto', 'cuda', or 'cpu'
  epochs: 40
  batch_size: 16
  lr: 0.0007 # Learning rate
  weight_decay: 0.0001 # L2 regularization
  eval_target_recall: 0.9 # Target recall for threshold selection on validation set
  threshold_method: precision_at_recall # 'precision_at_recall' (forensic high-recall) or 'max_f1'
  lambda_ri: 10.0 # 5.0 Weight for RI classification loss (increased importance)
  lambda_dv12: 0.05 # 0.2 Weight for 12‑h intensity change regression (reduced)
  lambda_dv24: 0.05 # 0.2 Weight for 24‑h intensity change regression (reduced)

  # ------------------------------------------------------------------
  # Physics-guided loss weights (read by src/training/trainer.py::_physics_loss).
  # These are the ONLY switches that make the model physics-guided.
  # When every weight below is 0.0 the model is a plain 3D-CNN classifier.
  # Set a weight to 0.0 to disable that individual term.
  # ------------------------------------------------------------------
  physics:
    lambda_prior_align: 1.0   # KL alignment: FuelMap distribution <- physical prior map (fuel potential)
    lambda_forward: 0.5       # Forward constraint: dv24_forward_hat (energy localized on prior) must predict dv24
    lambda_tv: 0.001          # FuelMap total-variation smoothness regularizer
    lambda_l1: 0.0001         # FuelMap L1 sparsity regularizer
    # Equation consistency (vort/div recomputed from u/v vs the stored vort/div channels).
    # WEAK / representational only: both sides derive from the SAME input wind field, so this
    # term is near-degenerate (penalises mostly grid-edge discretisation differences). It is NOT
    # a physical-discovery constraint. Off by default; documented for transparency.
    lambda_consistency: 0.0

# ----------------------------------------------------------------------
# Reproducibility: Determinism and parallel workers
# ----------------------------------------------------------------------
repro:
  torch_deterministic: true # Ensure deterministic CuDNN operations (may slow training)
  num_workers: 4 # Number of DataLoader workers
